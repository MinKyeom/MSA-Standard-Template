# Fluent Bit 2.x 파서 — Docker JSON 및 Java 스택트레이스
# [PARSER] 형식으로 등록 (parser 'docker' is not registered 방지)
[PARSER]
    Name        docker
    Format      json
    Time_Key    time
    Time_Format %Y-%m-%dT%H:%M:%S.%L

# Java 첫 줄 패턴 (StackTrace는 다음 줄부터 이어짐)
# 예: 2024-01-15 10:00:00.123 ERROR [gateway,,] --- ...
[PARSER]
    Name          java_firstline
    Format        regex
    Regex         ^\d{4}-\d{2}-\d{2}\s+\d{2}:\d{2}:\d{2}\.\d{3}\s+\w+
    Time_Key      time
    Time_Format   %Y-%m-%d %H:%M:%S.%L
