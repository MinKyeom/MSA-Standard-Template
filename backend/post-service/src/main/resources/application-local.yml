server:
  port: 8082
  forward-headers-strategy: native

spring:
  datasource:
    url: jdbc:h2:mem:postdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      acks: 0

jwt:
  secret: ${JWT_SECRET:dev-only-replace-with-strong-secret-in-production}

USER_SERVICE_URL: http://localhost:8081
search:
  service:
    url: http://localhost:8010

app:
  post:
    cover-upload-dir: ./data/post-covers

