server:
  port: 8084
  forward-headers-strategy: native
  servlet:
    context-path: /auth

spring:
  datasource:
    url: jdbc:postgresql://db-auth:5432/mk_auth
    username: postgres
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: ${SPRING_REDIS_HOST:redis}
      port: 6379
  kafka:
    bootstrap-servers: msa-kafka:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
  # OAuth2: SNS 미설정 시 비활성화. 나중에 OAUTH2_GOOGLE_CLIENT_ID 등 설정 후 사용.
  # client-id가 비어 있으면 기동 시 "Client id must not be empty" 발생하므로, 미설정 시 더미값 사용.
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${OAUTH2_GOOGLE_CLIENT_ID:__oauth_disabled__}
            client-secret: ${OAUTH2_GOOGLE_CLIENT_SECRET:__oauth_disabled__}
            scope: openid,profile,email
            # 브라우저가 돌아올 URL = 게이트웨이 공개 주소(로컬: 8085). IdP 콘솔에 동일 URI 등록 필요.
            redirect-uri: "${OAUTH2_REDIRECT_BASE:http://localhost:8085}/auth/login/oauth2/code/{registrationId}"
          kakao:
            client-id: ${OAUTH2_KAKAO_CLIENT_ID:__oauth_disabled__}
            client-secret: ${OAUTH2_KAKAO_CLIENT_SECRET:__oauth_disabled__}
            scope: openid,profile_nickname,account_email
            client-name: Kakao
            authorization-grant-type: authorization_code
            # 프록시/헤더 의존 없이 리다이렉트 URI 고정 (Google/Kakao 콘솔에 동일 URI 등록 필요)
            redirect-uri: "${OAUTH2_REDIRECT_BASE:http://localhost:8085}/auth/login/oauth2/code/{registrationId}"
            client-authentication-method: client_secret_post
          github:
            client-id: ${OAUTH2_GITHUB_CLIENT_ID:__oauth_disabled__}
            client-secret: ${OAUTH2_GITHUB_CLIENT_SECRET:__oauth_disabled__}
            scope: read:user,user:email
            client-name: GitHub
            authorization-grant-type: authorization_code
            redirect-uri: "${OAUTH2_REDIRECT_BASE:http://localhost:8085}/auth/login/oauth2/code/{registrationId}"
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

# JWT
jwt:
  secret: ${JWT_SECRET:dev-only-replace-with-strong-secret-in-production}
  access-expiry-minutes: 30
  refresh-expiry-days: 7
  extend-grace-seconds: 60

# 쿠키 도메인: 프로덕션에서는 .yourdomain.com 형태로 설정
# 첫 메인 관리자 계정 부트스트랩 (없을 때만 생성)
app:
  cookie-domain: ${COOKIE_DOMAIN:}
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  admin:
    username: ${ADMIN_USERNAME:}
    password: ${ADMIN_PASSWORD:}
