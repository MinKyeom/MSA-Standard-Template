# ============================================================
# Fluent Bit — MSA 블로그 로그 수집 (4GB Lightsail 최소 리소스)
# - Docker 컨테이너 로그 수집
# - Java StackTrace 멀티라인 파싱
# - Trace ID 기반 통합 로그 추적 (X-Trace-Id)
# - Loki로 전송 (7일 보존)
# ============================================================

[SERVICE]
    Flush         5
    Grace         5
    Log_Level     info
    Parsers_File  parsers.conf

# Docker 컨테이너 로그 입력 (JSON 드라이버)
# 각 서비스에서 로그에 trace_id 등을 포함하면 파싱 가능
[INPUT]
    Name              tail
    Tag               msa.*
    Path              /var/lib/docker/containers/*/*.log
    Parser            docker
    DB                /tmp/flb_container.db
    Mem_Buf_Limit     5MB
    Skip_Long_Lines   On
    Refresh_Interval  10

# Java StackTrace 멀티라인 파싱 (멀티라인 모드에서는 Parser 사용 불가 — Parser_Firstline만 사용)
[INPUT]
    Name              tail
    Tag               msa.java
    Path              /var/lib/docker/containers/*/*.log
    DB                /tmp/flb_java.db
    Mem_Buf_Limit     5MB
    Multiline         On
    Multiline_Flush   5
    Parser_Firstline  java_firstline

# Loki로 전송 (Fluent Bit 2.2: Auto_retry_on 미지원 제거)
[OUTPUT]
    Name              loki
    Match             *
    Host              loki
    Port              3100
    Labels            job=fluentbit, container=$container_name
    Label_keys        $container_name
