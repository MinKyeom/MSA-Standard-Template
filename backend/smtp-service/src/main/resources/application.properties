# 서버 포트 설정
server.port=8083

# Kafka 설정 (Docker Compose 서비스 이름 'msa-kafka' 사용)
spring.kafka.bootstrap-servers=msa-kafka:9092
spring.kafka.consumer.group-id=mail-group
spring.kafka.consumer.auto-offset-reset=earliest
# spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
# spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
# [핵심 수정] 역직렬화 설정: ErrorHandlingDeserializer를 사용하여 오류 발생 시 무한 루프 방지
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer

# [핵심 추가] 실제 역직렬화는 JsonDeserializer가 담당하도록 설정
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer

# [핵심 추가] 보낸 쪽의 MailEvent 클래스 경로가 달라도 Map으로 읽어오도록 설정
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.consumer.properties.spring.json.value.default.type=java.util.Map

spring.kafka.consumer.properties.spring.json.trusted.packages=*
# NOT_COORDINATOR / request timeout 완화: 브로커 일시 불안정 시 재연결 여유
spring.kafka.consumer.properties.request.timeout.ms=40000
spring.kafka.consumer.properties.session.timeout.ms=20000
spring.kafka.consumer.properties.max.poll.interval.ms=120000

# Google SMTP 메일 발송 설정
spring.mail.host=smtp.gmail.com
spring.mail.port=587
# 운영/배포 환경에서는 .env(또는 Secrets)로 주입하는 값을 사용합니다.
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# 로깅 설정
logging.level.com.mk.mail_service=DEBUG