server:
  port: 8081
  forward-headers-strategy: native

spring:
  datasource:
    url: jdbc:postgresql://db-user:5432/mk_user
    username: postgres
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  # Redis 설정 추가 (properties에서 가져옴)
  data:
    redis:
      host: ${SPRING_REDIS_HOST:redis}
      port: 6379

  # Kafka 설정 통합
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:msa-kafka:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: user-service-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.use.type.headers: false
        spring.json.value.default.type: com.mk.user_service.dto.UserCreatedEvent
        # NOT_COORDINATOR / request timeout 완화: 브로커 일시 불안정 시 재연결 여유
        request.timeout.ms: 40000
        session.timeout.ms: 20000
        max.poll.interval.ms: 120000
        
jwt:
  secret: ${JWT_SECRET:dev-only-replace-with-strong-secret-in-production}