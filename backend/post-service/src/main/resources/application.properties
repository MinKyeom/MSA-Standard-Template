# -----------------------------------
# Post Service Configuration
# -----------------------------------
server.port=8082

# ⭐ [수정] PostgreSQL Connection (Docker Compose의 'db-post' 서비스 사용)
spring.datasource.url=jdbc:postgresql://db-post:5432/mk_post
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# ⭐ [수정] JPA/Hibernate Configuration (PostgreSQLDialect 설정)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# 한 번에 연관 관계를 읽어올 개수 (N+1 문제 해결)
spring.jpa.properties.hibernate.default_batch_fetch_size=100

# Security AutoConfiguration 제외
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

# -----------------------------------
# MSA Service Communication (도커 네트워크 기반)
# -----------------------------------
user.service.url=http://user-service:8081
search.service.url=${SEARCH_SERVICE_URL:http://search-service:8010}

# JWT 설정
jwt.secret=${JWT_SECRET:dev-only-replace-with-strong-secret-in-production}

# Kafka — Search 서비스 임베딩 인덱싱용 이벤트 발행
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:msa-kafka:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
post.kafka.topic=post.events

# 포스트 카드 썸네일 업로드 (Docker에서는 볼륨 마운트 권장)
app.post.cover-upload-dir=${POST_COVER_UPLOAD_DIR:./data/post-covers}
spring.servlet.multipart.max-file-size=24MB
spring.servlet.multipart.max-request-size=24MB