# push → GitHub Runner(클라우드)에서 docker compose build/push(GHCR) — 맥/PC 로컬 Docker 빌드와 별개
#    로컬에서는 git push 만 하면 됨. 이미지는 Actions 가 매 커밋 SHA 태그로 새로 빌드·푸시합니다.
#
# 호스트 Nginx(nginx/msa-project.conf.template)는 Docker Compose 에 포함되지 않음.
#    git pull 후 서버에서 ./scripts/render-nginx.sh → 설정 복사·nginx -t && sudo systemctl reload nginx
#
# Secrets (Repository → Settings → Secrets and variables → Actions):
#   ENV_VARS   — 프로젝트 루트 .env 와 동일한 다줄 내용 (NEXT_PUBLIC_*, DOCKER_IMAGE_PREFIX, JWT 등)
#   HOST       — 서버 호스트(IP/도메인)
#   USERNAME   — SSH 사용자
#   KEY        — SSH 개인 키(PEM 전체)
#   DEPLOY_PATH — (선택) 배포 디렉터리 절대 경로. 비우면 /home/<USERNAME>/<저장소이름>
#
# Variables (같은 메뉴 → Variables) — 권장: PUBLIC_SITE_URL, PUBLIC_API_URL(https 오리진), (선택) PUBLIC_CHATBOT_URL
#   PUBLIC_API_URL 이 https 이면 OAUTH2_REDIRECT_BASE·CORS_ALLOWED_ORIGINS 가 비었거나 localhost 면 자동 보정됩니다(scripts/merge-ci-env-overrides.sh).
#
# CI 는 .env 끝에 DOCKER_IMAGE_PREFIX(ghcr)·IMAGE_TAG(SHA) 를 덮어써 이번 빌드 이미지를 씁니다.
#
# 선택적 빌드: 변경된 마이크로서비스·프론트만 compose build, 나머지는 이전 커밋 이미지를 GHCR 에서
#   동일 SHA 태그로 retag(scripts/ci-retag-unchanged-images.sh). README 등만 바뀌면 워크플로 자체가 안 돕니다(paths-ignore).
# 수동 전체 빌드: Actions → Build and deploy → Run workflow → build_mode = full
#
# 참고: job 수준 if 에서 secrets.* 를 쓰면 워크플로 검증 오류가 납니다(GitHub 제한).

name: Build and deploy

on:
  push:
    branches: [main, master]
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - "docs/**"
  workflow_dispatch:
    inputs:
      build_mode:
        description: "partial = 변경분만 빌드(기본), full = 앱 이미지 8개 전부 빌드"
        type: choice
        required: true
        default: partial
        options:
          - partial
          - full

# 동일 브랜치에서 push·수동 실행이 겹치면 GHCR 푸시·SSH 배포가 경쟁할 수 있음 → 같은 ref 는 한 번에 하나만 실행(나머지는 대기 큐).
concurrency:
  group: build-deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  # Node 20 액션 런타임 경고 완화 · 2026년 기본 전환 대비 (https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    permissions:
      contents: read
      packages: write
    outputs:
      image_prefix: ${{ steps.meta.outputs.prefix }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: GHCR 이미지 프리픽스 (소문자)
        id: meta
        run: |
          LC_REPO=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')
          echo "prefix=ghcr.io/${LC_REPO}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: ENV_VARS 로 compose용 .env.build 작성
        env:
          ENV_VARS: ${{ secrets.ENV_VARS }}
        run: |
          if [ -z "${ENV_VARS}" ]; then
            echo "::error::Secret ENV_VARS 가 비어 있습니다. .env 전체를 ENV_VARS 에 등록하세요."
            exit 1
          fi
          printf '%s\n' "$ENV_VARS" > .env.build
          echo "DOCKER_IMAGE_PREFIX=${{ steps.meta.outputs.prefix }}" >> .env.build
          echo "IMAGE_TAG=${{ github.sha }}" >> .env.build
          # compose.yml 의 env_file: .env 때문에 push 시 루트 .env 가 필요함(러너에는 없음 → 동일 내용 복사)
          cp .env.build .env

      - name: Variables로 NEXT_PUBLIC·OAuth·CORS 병합
        env:
          SITE: ${{ vars.PUBLIC_SITE_URL }}
          API: ${{ vars.PUBLIC_API_URL }}
          CHAT: ${{ vars.PUBLIC_CHATBOT_URL }}
        run: |
          bash scripts/merge-ci-env-overrides.sh .env.build
          cp .env.build .env

      - name: 선택적 빌드 및 GHCR 푸시
        env:
          DOCKER_BUILDKIT: "1"
          COMPOSE_DOCKER_CLI_BUILD: "1"
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          INPUT_BUILD_MODE: ${{ inputs.build_mode }}
        run: |
          set -euo pipefail
          FULL_BUILD=false
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ] && [ "${INPUT_BUILD_MODE:-partial}" = "full" ]; then
            FULL_BUILD=true
          fi
          export FULL_BUILD
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            if git rev-parse --verify HEAD^ >/dev/null 2>&1; then
              BEFORE=$(git rev-parse HEAD^)
            else
              BEFORE="0000000000000000000000000000000000000000"
            fi
          else
            BEFORE="${{ github.event.before }}"
          fi
          AFTER="${{ github.sha }}"
          PLAN=$(bash scripts/determine-docker-services-ci.sh "$BEFORE" "$AFTER")
          echo "::notice:: Docker CI plan: ${PLAN} (FULL_BUILD=${FULL_BUILD})"
          if [ "$FULL_BUILD" = "true" ] || [ "$PLAN" = "ALL" ]; then
            docker compose --env-file .env.build build --parallel
            docker compose --env-file .env.build push
          elif [ "$PLAN" = "RETAG" ]; then
            bash scripts/ci-retag-unchanged-images.sh .env.build "$BEFORE" "$AFTER"
          else
            read -r -a TOBUILD <<< "$PLAN"
            docker compose --env-file .env.build build "${TOBUILD[@]}"
            docker compose --env-file .env.build push "${TOBUILD[@]}"
            bash scripts/ci-retag-unchanged-images.sh .env.build "$BEFORE" "$AFTER" "${TOBUILD[@]}"
          fi
          bash scripts/post-deploy-docker-prune.sh

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v5

      - name: 배포용 Secret 존재 확인
        env:
          H: ${{ secrets.HOST }}
          U: ${{ secrets.USERNAME }}
          K: ${{ secrets.KEY }}
          E: ${{ secrets.ENV_VARS }}
        run: |
          if [ -z "$H" ] || [ -z "$U" ] || [ -z "$K" ] || [ -z "$E" ]; then
            echo "::error::Repository Actions Secrets 에 HOST, USERNAME, KEY, ENV_VARS 를 모두 설정하세요."
            exit 1
          fi

      - name: 서버에 쓸 .env 파일 생성
        env:
          ENV_VARS: ${{ secrets.ENV_VARS }}
          SITE: ${{ vars.PUBLIC_SITE_URL }}
          API: ${{ vars.PUBLIC_API_URL }}
          CHAT: ${{ vars.PUBLIC_CHATBOT_URL }}
        run: |
          printf '%s\n' "$ENV_VARS" > .env.deploy.tmp
          echo "DOCKER_IMAGE_PREFIX=${{ needs.build-and-push.outputs.image_prefix }}" >> .env.deploy.tmp
          echo "IMAGE_TAG=${{ github.sha }}" >> .env.deploy.tmp
          bash scripts/merge-ci-env-overrides.sh .env.deploy.tmp

      - name: .env 서버로 복사
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          source: ".env.deploy.tmp"
          target: "/tmp/"

      - name: SSH 배포
        uses: appleboy/ssh-action@v1.0.3
        env:
          REMOTE_DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          envs: REMOTE_DEPLOY_PATH
          # 대용량 pull·재기동 대비 (job timeout 300m 와 별개)
          command_timeout: 300m
          script_stop: true
          script: |
            set -euo pipefail
            REPO="${{ github.event.repository.name }}"
            BRANCH="${{ github.ref_name }}"
            if [ -z "${REMOTE_DEPLOY_PATH:-}" ]; then
              TARGET="/home/$(whoami)/${REPO}"
            else
              TARGET="$REMOTE_DEPLOY_PATH"
            fi
            mkdir -p "$TARGET"
            mv /tmp/.env.deploy.tmp "${TARGET}/.env"
            cd "$TARGET"
            git fetch origin "${BRANCH}"
            git checkout "${BRANCH}"
            git pull --ff-only origin "${BRANCH}"
            bash scripts/install-logrotate-rules.sh
            export DOCKER_IMAGE_PREFIX="${{ needs.build-and-push.outputs.image_prefix }}"
            export IMAGE_TAG="${{ github.sha }}"
            # --pull always 로 레지스트리 최신 이미지 확보 + 강제 재생성(별도 pull 생략으로 이중 다운로드 방지)
            docker compose up -d --pull always --force-recreate --remove-orphans
            bash scripts/post-deploy-docker-prune.sh
