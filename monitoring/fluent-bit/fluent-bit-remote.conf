# ============================================================
# Fluent Bit — 원격 Loki로 전송 (Host/Port 는 docker-compose 의 LOKI_HOST, LOKI_PORT)
# ============================================================

[SERVICE]
    Flush         5
    Grace         5
    Log_Level     info
    Parsers_File  parsers.conf

[INPUT]
    Name              tail
    Tag               msa.*
    Path              /var/lib/docker/containers/*/*.log
    Parser            docker
    DB                /tmp/flb_container.db
    Mem_Buf_Limit     5MB
    Skip_Long_Lines   On
    Refresh_Interval  10

[INPUT]
    Name              tail
    Tag               msa.java
    Path              /var/lib/docker/containers/*/*.log
    DB                /tmp/flb_java.db
    Mem_Buf_Limit     5MB
    Multiline         On
    Multiline_Flush   5
    Parser_Firstline  java_firstline

[OUTPUT]
    Name              loki
    Match             *
    Host              ${LOKI_HOST}
    Port              ${LOKI_PORT}
    uri               /loki/api/v1/push
    tls               On
    tls.verify        On
    Labels            job=fluentbit, container=$container_name
    Label_keys        $container_name
