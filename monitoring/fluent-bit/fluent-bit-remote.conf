# ============================================================
# Fluent Bit — 원격 Loki로 전송 (Host/Port 는 docker-compose 의 LOKI_HOST, LOKI_PORT)
# ============================================================

[SERVICE]
    Flush         5
    Grace         5
    Log_Level     info
    Parsers_File  parsers.conf
    # 백프레셔 시 메모리 폭증 방지: 청크를 파일시스템으로 spill
    storage.path  /tmp/flb-storage
    storage.sync  normal
    storage.checksum off
    storage.backlog.mem_limit 16M

[INPUT]
    Name              tail
    Tag               msa.*
    Path              /var/lib/docker/containers/*/*.log
    Parser            docker
    DB                /tmp/flb_container.db
    Mem_Buf_Limit     3MB
    Skip_Long_Lines   On
    Refresh_Interval  10
    storage.type      filesystem

[INPUT]
    Name              tail
    Tag               msa.java
    Path              /var/lib/docker/containers/*/*.log
    DB                /tmp/flb_java.db
    Mem_Buf_Limit     3MB
    Multiline         On
    Multiline_Flush   5
    Parser_Firstline  java_firstline
    storage.type      filesystem

[OUTPUT]
    Name              loki
    Match             *
    Host              ${LOKI_HOST}
    Port              ${LOKI_PORT}
    uri               /loki/api/v1/push
    tls               On
    tls.verify        On
    workers           2
    Retry_Limit       False
    Labels            job=fluentbit, container=$container_name
    Label_keys        $container_name
